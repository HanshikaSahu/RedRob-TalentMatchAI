ai_usage_summary: |
  Claude and ChatGPT were used for architectural discussion, debugging support,
  and code review during development. All design decisions, implementation,
  testing, and iterative tuning of the scoring weights and filters were carried
  out by the developer. No candidate data was sent to any external LLM service
  during ranking.

methodology_summary: |
  Multi-signal candidate ranking system using sentence-transformers for semantic
  matching between the job description and candidate career histories. Applied
  hard disqualification filters (inactive 6+ months, pure consulting background)
  before scoring, removing ~30% of candidates upfront. Final score combines
  semantic similarity (35%), experience quality at product companies (25%),
  behavioral availability signals (20%), verified platform signals like
  assessment scores and GitHub activity (12%), and nice-to-have skills (8%).
  Title relevance penalty (0.25x) and job hopper penalty (0.5-0.7x) applied
  as multipliers. A one-time precompute step generates embeddings for ~70,000
  surviving candidates (~2 hours, offline); the ranking step loads these
  precomputed embeddings and produces the final ranked CSV in under a minute,
  well within the 5-minute / 16GB / CPU-only constraint.

